  # Option B: MCP tool (uncomment to use)
  - class_name: "recipe.gui_agent.mcp_desktop_env_tool.MCPDesktopEnvTool"
    config:
      type: native
      allocator_base_url: ${oc.env:MCP_ALLOCATOR_URL,http://ns008-cu-manager-svc}
      allocator_env: "huaiyizhao"
      allocator_namespace: "Development"
      expire_min: 60
      auth_token: null
      timeout: 30
      reboot_max_retries: 12
      reboot_retry_interval: 2.0
      screen_width: 1000
      screen_height: 1000
      step_reward: 0.0
